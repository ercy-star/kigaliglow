name: KigaliGlow CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Test server file exists
        run: test -f server.js

      - name: Test public files exist
        run: |
          test -f public/index.html
          test -f public/products.html
          test -f public/cart.html
          test -f public/checkout.html

      - name: Build Docker image
        run: docker build -t kigaliglow .