<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - KigaliGlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">KigaliGlow Admin</div>
        <nav>
            <a href="index.html">Back to Store</a>
        </nav>
    </header>

    <section class="cart-section" style="max-width: 1000px;">
        <h1>Admin Dashboard 🛠️</h1>

        <div id="admin-stats" style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:2rem;"></div>

        <h2>All Sellers</h2>
        <div id="admin-sellers"></div>

        <h2 style="margin-top:2rem;">All Products</h2>
        <div id="admin-products"></div>

        <h2 style="margin-top:2rem;">All Orders</h2>
        <div id="admin-orders"></div>
    </section>

    <footer>
        <p>&copy; 2026 KigaliGlow. All rights reserved.</p>
    </footer>

    <script>
        const ADMIN_PASSWORD = "kigaliglow2026"; // change this to your own secret password

        function loadAdminData() {
            Promise.all([
                fetch("/api/sellers").then(r => r.json()),
                fetch("/api/products").then(r => r.json()),
                fetch("/api/orders").then(r => r.json())
            ]).then(([sellers, products, orders]) => {
                renderStats(sellers, products, orders);
                renderSellers(sellers);
                renderProducts(products);
                renderOrders(orders);
            });
        }

        function renderStats(sellers, products, orders) {
            const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);
            const totalCommission = orders.reduce((sum, o) =>
                sum + o.items.reduce((s, i) => s + (i.commission || 0), 0), 0);

            document.getElementById("admin-stats").innerHTML = `
                <div class="feature" style="flex:1;"><h3>${sellers.length}</h3><p>Registered Sellers</p></div>
                <div class="feature" style="flex:1;"><h3>${products.length}</h3><p>Total Products</p></div>
                <div class="feature" style="flex:1;"><h3>${orders.length}</h3><p>Total Orders</p></div>
                <div class="feature" style="flex:1;"><h3>${totalRevenue.toLocaleString()} RWF</h3><p>Total Revenue</p></div>
                <div class="feature" style="flex:1;"><h3>${totalCommission.toLocaleString()} RWF</h3><p>KigaliGlow Commission</p></div>
            `;
        }

        function renderSellers(sellers) {
            const container = document.getElementById("admin-sellers");
            if (sellers.length === 0) {
                container.innerHTML = "<p>No sellers registered yet.</p>";
                return;
            }
            container.innerHTML = sellers.map(s => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h3>${s.shopName}</h3>
                        <p>Owner: ${s.name} | ${s.email} | ${s.phone}</p>
                    </div>
                    <div class="cart-item-subtotal">ID: ${s.id}</div>
                </div>
            `).join("");
        }

        function renderProducts(products) {
            const container = document.getElementById("admin-products");
            container.innerHTML = products.map(p => `
                <div class="cart-item">
                    <span class="cart-emoji">${p.emoji}</span>
                    <div class="cart-item-info">
                        <h3>${p.name}</h3>
                        <p>${p.category} | Sold by: ${p.sellerName}</p>
                    </div>
                    <div class="cart-item-subtotal">${p.price.toLocaleString()} RWF</div>
                </div>
            `).join("");
        }

        function renderOrders(orders) {
            const container = document.getElementById("admin-orders");
            if (orders.length === 0) {
                container.innerHTML = "<p>No orders placed yet.</p>";
                return;
            }
            container.innerHTML = orders.map(o => `
                <div class="cart-item" style="flex-direction:column; align-items:flex-start;">
                    <h3>Order #${o.id} — ${o.total.toLocaleString()} RWF</h3>
                    <p style="font-size:0.85rem; color:#777;">${new Date(o.createdAt).toLocaleString()}</p>
                    ${o.items.map(i => `
                        <p style="margin-left:1rem;">${i.emoji || ""} ${i.name} x${i.quantity} — ${i.itemTotal ? i.itemTotal.toLocaleString() : (i.price * i.quantity).toLocaleString()} RWF</p>
                    `).join("")}
                </div>
            `).join("");
        }

        function checkAdminAccess() {
            const entered = prompt("Enter admin password:");
            if (entered === ADMIN_PASSWORD) {
                loadAdminData();
            } else {
                alert("Access denied. Redirecting to homepage.");
                window.location.href = "index.html";
            }
        }

        checkAdminAccess();
    </script>
</body>
</html>
