
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - KigaliGlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">KigaliGlow </div>
        <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Shop</a>
    <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    <a href="seller-register.html">Sell on KigaliGlow</a>
</nav>
    </header>

    <section class="checkout-section">
        <div class="checkout-left">
            <h2>Customer Details</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="e.g. Amina Uwase">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="e.g. amina@gmail.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 0788123456">
            </div>
            <div class="form-group">
                <label>Delivery Address</label>
                <input type="text" id="address" placeholder="e.g. Kigali, Gasabo">
            </div>
            <button class="btn" onclick="placeOrder()">Place Order ✅</button>
        </div>

        <div class="checkout-right">
            <h2>Order Summary</h2>
            <div id="order-summary"></div>
            <div id="order-total"></div>
        </div>
    </section>

    <div id="confirmation-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🎉 Order Confirmed!</h2>
            <p>Thank you for your order. We will deliver to you soon!</p>
            <p id="confirmation-details"></p>
            <a href="index.html" class="btn">Back to Home</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 KigaliGlow. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        function displayOrderSummary() {
            const cart = getCart();
            const summary = document.getElementById("order-summary");
            const totalEl = document.getElementById("order-total");

            if (cart.length === 0) {
                summary.innerHTML = "<p>Your cart is empty. <a href='products.html'>Shop now</a></p>";
                return;
            }

            summary.innerHTML = cart.map(item => `
                <div class="summary-item">
                    <span>${item.emoji} ${item.name} x${item.quantity}</span>
                    <span>${(item.price * item.quantity).toLocaleString()} RWF</span>
                </div>
            `).join("");

            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            totalEl.innerHTML = `<h3 class="summary-total">Total: ${total.toLocaleString()} RWF</h3>`;
        }

        function placeOrder() {
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const address = document.getElementById("address").value.trim();

            if (!name || !email || !phone || !address) {
                alert("Please fill in all fields!");
                return;
            }

            const cart = getCart();
            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

            // Send order to backend
            fetch("/api/orders", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, phone, address, cart, total })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("confirmation-details").textContent =
                    `Order #${data.orderId} for ${name} — ${total.toLocaleString()} RWF`;
                document.getElementById("confirmation-modal").classList.remove("hidden");
                saveCart([]);
            })
            .catch(() => {
                // Fallback if backend not running yet
                document.getElementById("confirmation-details").textContent =
                    `Order for ${name} — ${total.toLocaleString()} RWF`;
                document.getElementById("confirmation-modal").classList.remove("hidden");
                saveCart([]);
            });
        }

        displayOrderSummary();
    </script>
</body>
</html>
